<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#1a237e" stroke="#ffd740" stroke-width="3"/>

  <!-- Fleur-de-lis / Scout emblem shape -->
  <!-- Center lily top petal -->
  <path d="M60 15 C55 25 52 32 52 40 C52 48 56 52 60 54 C64 52 68 48 68 40 C68 32 65 25 60 15Z"
        fill="#ffd740"/>
  <!-- Left petal -->
  <path d="M40 38 C30 35 22 38 18 44 C16 50 20 56 28 56 C34 56 40 52 44 48 C42 44 40 42 40 38Z"
        fill="#ffd740"/>
  <!-- Right petal -->
  <path d="M80 38 C90 35 98 38 102 44 C104 50 100 56 92 56 C86 56 80 52 76 48 C78 44 80 42 80 38Z"
        fill="#ffd740"/>
  <!-- Center stem and base bar -->
  <rect x="57" y="52" width="6" height="20" fill="#ffd740" rx="2"/>
  <rect x="44" y="68" width="32" height="5" fill="#ffd740" rx="2"/>
  <!-- Star in center -->
  <circle cx="60" cy="46" r="5" fill="#1a237e"/>
  <polygon points="60,41 61.5,44.5 65,44.5 62.5,46.5 63.5,50 60,48 56.5,50 57.5,46.5 55,44.5 58.5,44.5"
           fill="#ffd740"/>

  <!-- Text arc -->
  <path id="topArc" d="M 20 60 A 40 40 0 0 1 100 60" fill="none"/>
  <path id="botArc" d="M 18 65 A 44 44 0 0 0 102 65" fill="none"/>

  <!-- "SCOUTS" text bottom -->
  <text font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">
    <textPath href="#botArc" startOffset="50%">SCOUTS ATTENDANCE</textPath>
  </text>

  <!-- Decorative stars -->
  <text x="28" y="95" font-size="10" fill="#ffd740">★</text>
  <text x="87" y="95" font-size="10" fill="#ffd740">★</text>
</svg>
