name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Railway API URL
        run: |
          API_URL="${{ secrets.API_URL }}"
          if [ -z "$API_URL" ]; then
            echo "WARNING: API_URL secret not set — using placeholder. Set it after Railway deployment."
            API_URL="https://your-railway-api-url-here"
          fi
          sed -i "s|RAILWAY_API_URL|${API_URL}|g" src/environments/environment.prod.ts
          echo "API URL injected: $API_URL"

      - name: Build
        run: npx ng build --configuration production --base-href /scouts-attendance/

      - name: Add 404.html for SPA routing
        run: cp dist/scouts-attendance/browser/index.html dist/scouts-attendance/browser/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/scouts-attendance/browser
          force_orphan: true
