name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write production environment file
        run: |
          API_URL="${{ secrets.API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://scouts-attendance-api-production.up.railway.app"
          fi
          cat > src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            apiUrl: '${API_URL}/api'
          };
          EOF
          echo "environment.prod.ts:"
          cat src/environments/environment.prod.ts

      - name: Build
        run: npx ng build --configuration production --base-href /scouts-attendance/

      - name: Add 404.html for SPA routing
        run: cp dist/scouts-attendance/browser/index.html dist/scouts-attendance/browser/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/scouts-attendance/browser
          force_orphan: true
