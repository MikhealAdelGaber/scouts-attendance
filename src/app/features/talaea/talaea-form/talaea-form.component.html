<div class="page-container">
  <div class="page-header">
    <h1>
      <mat-icon>{{ isEdit ? 'edit' : 'add' }}</mat-icon>
      {{ isEdit ? 'Edit Talaea' : 'New Talaea' }}
    </h1>
    <button mat-button routerLink="/talaea"><mat-icon>arrow_back</mat-icon> Back</button>
  </div>

  <mat-card style="max-width:500px">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name">
          <mat-error *ngIf="form.get('name')?.hasError('required')">Required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="2"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Troop</mat-label>
          <mat-select formControlName="troopId" [disabled]="isEdit">
            @for (t of troops; track t.id) {
              <mat-option [value]="t.id">{{ t.name }} ({{ t.groupName }})</mat-option>
            }
          </mat-select>
          <mat-error *ngIf="form.get('troopId')?.hasError('required')">Required</mat-error>
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/talaea">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="loading || form.invalid">
            <mat-icon>save</mat-icon> {{ isEdit ? 'Update' : 'Create' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
